<html>

<head>
    <meta charset="utf-8" />
    <script type="text/javascript">
        //1. 내 이름을 for문 이용, 7번 출력
        for (var j = 0; j < 7; j = j + 1) {
            document.write("이연수<br>");
        }

        document.write("----------------<br>");
        //2. while문을 이용, 7번 출력
        var k = 0;
        while (k < 7) {
            document.write("이연수<br>");
            k = k + 1;

        }

        document.write("----------------<br>");
        var i = 0;
        do {
            document.write((i + 1) + "yeonsoo<br>");
            i = i + 1;
        } while (i < 7)




    </script>
</head>
